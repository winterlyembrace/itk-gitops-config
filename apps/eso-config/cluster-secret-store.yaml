apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kubernetes-cluster-store
spec:
  provider:
    vault:
      server: "http://10.129.0.39:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-eso-role"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"

