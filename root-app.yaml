apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-applicationset-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/winterlyembrace/itk-gitops-config
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

